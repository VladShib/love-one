<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для любимки ❤️</title>
    <style>
        
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ffe3ec 0%, #ffb3c6 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        .background-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .bg-heart {
            position: absolute;
            font-size: 24px;
            animation: floatBackground 8s linear infinite;
        }

        @keyframes floatBackground {
            0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .card {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.5);
            padding: 40px 50px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(255, 75, 110, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.6);
            transform: scale(1);
            transition: transform 0.3s ease;
            max-width: 90%;
        }

        .card:hover {
            transform: scale(1.02);
        }

        h1 {
            color: #ff4b6e;
            margin-bottom: 30px;
            font-size: 2.3rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.05);
            transition: color 0.3s ease;
        }

        .love-button {
            background: linear-gradient(45deg, #ff4b6e, #ff758f);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 75, 110, 0.5),
                        inset 0 -5px 10px rgba(0, 0, 0, 0.2),
                        inset 0 5px 10px rgba(255, 255, 255, 0.4);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            outline: none;
        }

        .love-button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 30%;
            height: 200%;
            background: rgba(255, 255, 255, 0.6);
            transform: rotate(30deg);
            transition: 0.5s;
            opacity: 0;
        }

        .love-button:hover::before {
            left: 130%;
            opacity: 1;
        }

        .love-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 75, 110, 0.7),
                        inset 0 -3px 5px rgba(0, 0, 0, 0.2);
        }

        .love-button:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: 0 5px 10px rgba(255, 75, 110, 0.5);
        }

        /* Стили для падающего дождя из хаотичных эмодзи */
        .rain-heart {
            position: absolute;
            font-size: 32px;
            pointer-events: none;
            z-index: 5;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% {
                transform: translateY(-50px) translateX(0) rotate(0deg) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) translateX(var(--drift)) rotate(var(--rotation)) scale(var(--scale));
                opacity: 0.1;
            }
        }

        .meme-67 {
            position: absolute;
            font-size: 3rem;
            font-weight: 900;
            color: #e60026;
            text-shadow: 3px 3px 0px #000;
            z-index: 20;
            pointer-events: none;
            animation: popMeme 2s ease-out forwards, blinkMeme 0.2s linear infinite;
        }

        @keyframes popMeme {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            15% { transform: scale(1.2) rotate(10deg); opacity: 1; }
            85% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0; }
        }
        @keyframes blinkMeme {
            0%, 100% { color: #e60026; }
            50% { color: #ffeb3b; }
        }

        /* Вылетающий случайный текст в случайных местах */
        .floating-phrase {
            position: absolute;
            z-index: 15;
            font-weight: bold;
            font-size: 1.8rem;
            color: #ff2a5f;
            text-shadow: 2px 2px 8px rgba(255,255,255,0.9), -2px -2px 8px rgba(255,255,255,0.9);
            background: rgba(255, 255, 255, 0.7);
            padding: 8px 15px;
            border-radius: 15px;
            pointer-events: none;
            animation: phraseOut 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            white-space: nowrap;
        }

        @keyframes phraseOut {
            0% { transform: scale(0.5) translateY(20px); opacity: 0; }
            10% { transform: scale(1) translateY(0); opacity: 1; }
            80% { opacity: 1; transform: translateY(-30px); }
            100% { opacity: 0; transform: translateY(-60px); }
        }

        .meme-photo {
            position: absolute;
            z-index: 30;
            max-width: 250px;
            max-height: 250px;
            border: 8px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 10px;
            pointer-events: none;
            animation: photoBoom 1.5s ease-in-out forwards;
        }

        @keyframes photoBoom {
            0% { transform: scale(0) rotate(-30deg); opacity: 0; }
            10% { transform: scale(1.3) rotate(15deg); opacity: 1; }
            15% { transform: scale(1) rotate(5deg); }
            85% { opacity: 1; transform: scale(1) rotate(5deg); }
            100% { transform: scale(0.5) translateY(50px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="background-hearts" id="bgHeartsContainer"></div>

    <div class="card">
        <h1 id="mainTitle">Для моей любимой Сашеньки</h1>
        <button class="love-button" id="loveBtn">Люблю тебя ❤️</button>
    </div>

    <script>
        const bgTypes = ['❤️', '💖', '💝', '💕', '🌸', '🐶', '🐕']; 
        
        const rainTypes = [
            '❤️', '💖', '💝', '💕', 
            '🏋️‍♀️', '🤸‍♀️', '🏃‍♀️', '💪', '👟', 
            '🏐', '🏀', 
            '🧔', '🧔‍♂️', 
            '🐶', '🐕' 
        ];

        const phrases = [
            "Джонник вредина!!!",
            "Влiд старый уже...",
            "Ыаыаыа сикс севен (аутизм)",
            "Какашки мне в кармашки",
            "Саша лучшая!!!",
            "Дашка какашка",
            "Владос понос",
            "Влад опаздывает на 20 минут",
            "Влiд не в прайме...",
            "Сашенька красивая очень!!!",
            "Это читает сигма вумен",
            "Любовь Морковь",
            "Бествей 💩",
            "И очень сильно! 🥰",
            "Тренер года! 💪",
            "Кто тут не в прайме???",
            "Турники и баскет (обожаюююю) (И тебя тоже! 🥰)",
            "Забыли сушибургер...",
            "Как можно было подскользнуться на ступеньках...",
            "Булочка с маком 🥰",
            "Ну крутая, ну моя!",
            "Воздуханчик",
            "Защекочу!!!",
            "Джонни мили",
            "ДЖОННИ, Не ешь говно!!!",
            "Ох этот дуэт... Романтика",
            "Дима опять порвал резинку!",
            "Очень сильно тебя люблю!!!"
        ];

        const photoUrls = [
            'photos/1.jpg', 'photos/2.jpg', 'photos/3.jpg', 'photos/4.jpg', 'photos/5.jpg',
            'photos/6.jpg', 'photos/7.jpg', 'photos/8.jpg', 'photos/9.jpg', 'photos/10.jpg', 
            'photos/11.jpg', 'photos/12.jpg', 'photos/13.jpg', 'photos/14.jpg', 'photos/15.jpg', 
            'photos/16.jpg', 'photos/17.jpg', 'photos/18.jpg', 'photos/19.jpg', 'photos/20.jpg',
            'photos/21.jpg', 'photos/22.jpg', 'photos/23.jpg', 'photos/24.jpg', 'photos/25.jpg', 
            'photos/26.jpg', 'photos/27.jpg', 'photos/28.jpg', 'photos/29.jpg', 'photos/30.jpg', 
            'photos/31.jpg'
        ];

        const boomSound = new Audio('https://www.myinstants.com/media/sounds/vine-boom.mp3');
        boomSound.volume = 0.6; 

        let clickCount = 0; 

        const bgContainer = document.getElementById('bgHeartsContainer');
        
        function createBackgroundElement() {
            const el = document.createElement('div');
            el.classList.add('bg-heart');
            el.innerText = bgTypes[Math.floor(Math.random() * bgTypes.length)];
            el.style.left = Math.random() * 100 + 'vw';
            
            const size = Math.random() * 22 + 15;
            el.style.fontSize = size + 'px';
            el.style.animationDuration = (Math.random() * 6 + 6) + 's'; 
            
            bgContainer.appendChild(el);
            setTimeout(() => { el.remove(); }, 12000);
        }
        
        setInterval(createBackgroundElement, 500);
        for(let i=0; i<15; i++) {
            setTimeout(createBackgroundElement, Math.random() * 4000);
        }

        const btn = document.getElementById('loveBtn');
        const mainTitle = document.getElementById('mainTitle');

        function getRandomPhrase() {
            return phrases[Math.floor(Math.random() * phrases.length)];
        }

        btn.addEventListener('click', () => {
            clickCount++;

            const count = 45;
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const drop = document.createElement('div');
                    drop.classList.add('rain-heart');
                    drop.innerText = rainTypes[Math.floor(Math.random() * rainTypes.length)];
                    
                    drop.style.left = Math.random() * 100 + 'vw';
                    drop.style.top = '-50px';
                    
                    const drift = (Math.random() * 240 - 120) + 'px';
                    const rotation = (Math.random() * 360) + 'deg';
                    const scale = (Math.random() * 0.7 + 0.6);
                    const duration = (Math.random() * 1.5 + 1.3) + 's';
                    
                    drop.style.setProperty('--drift', drift);
                    drop.style.setProperty('--rotation', rotation);
                    drop.style.setProperty('--scale', scale);
                    drop.style.animationDuration = duration;
                    
                    document.body.appendChild(drop);
                    setTimeout(() => { drop.remove(); }, 2500);
                }, i * 20);
            }

            const phraseForButton = getRandomPhrase();
            const phraseForTitle = getRandomPhrase();
            const phraseForScreen = getRandomPhrase();
            
            btn.innerText = phraseForButton;
            
            if(Math.random() < 0.4) {
                mainTitle.innerText = phraseForTitle;
            }

            const floatingText = document.createElement('div');
            floatingText.classList.add('floating-phrase');
            floatingText.innerText = phraseForScreen;
            floatingText.style.left = (Math.random() * 60 + 10) + 'vw'; // защита от вылета за края экрана
            floatingText.style.top = (Math.random() * 70 + 10) + 'vh';
            document.body.appendChild(floatingText);
            setTimeout(() => { floatingText.remove(); }, 2500);

            setTimeout(() => {
                if(btn.innerText === phraseForButton) btn.innerText = 'Люблю тебя ❤️';
                if(mainTitle.innerText === phraseForTitle) mainTitle.innerText = 'Для моей любимой Сашеньки';
            }, 3000);

            if(Math.random() < 0.25) {
                const meme = document.createElement('div');
                meme.classList.add('meme-67');
                meme.innerText = Math.random() < 0.5 ? "6 7" : "SIX SEVEN";
                
                const corners = [
                    { top: '10vh', left: '10vw' },
                    { top: '10vh', right: '10vw' },
                    { bottom: '10vh', left: '10vw' },
                    { bottom: '10vh', right: '10vw' }
                ];
                const chosenCorner = corners[Math.floor(Math.random() * corners.length)];
                
                if(chosenCorner.left) meme.style.left = chosenCorner.left;
                if(chosenCorner.right) meme.style.right = chosenCorner.right;
                if(chosenCorner.top) meme.style.top = chosenCorner.top;
                if(chosenCorner.bottom) meme.style.bottom = chosenCorner.bottom;

                document.body.appendChild(meme);
                setTimeout(() => { meme.remove(); }, 2000);
            }

            if(clickCount % 5 === 0) {
                if(Math.random() < 1) {
                    boomSound.currentTime = 0; 
                    boomSound.play().catch(e => console.log("Нужен клик для активации звука"));

                    const img = document.createElement('img');
                    img.classList.add('meme-photo');
                    img.src = photoUrls[Math.floor(Math.random() * photoUrls.length)];
                    
                    img.style.left = (Math.random() * 50 + 15) + 'vw';
                    img.style.top = (Math.random() * 50 + 15) + 'vh';

                    document.body.appendChild(img);
                    setTimeout(() => { img.remove(); }, 1500);
                }
            }
        });
    </script>
</body>
</html>
